version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    versioning-strategy: increase
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "astro-*"
      svelte:
        patterns:
          - "svelte"
          - "svelte-*"
      lint:
        patterns:
          - "eslint"
          - "eslint-plugin-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "prettier"
          - "prettier-plugin-*"
      types:
        patterns:
          - "typescript"
          - "@types/*"
      test:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@stryker-mutator/*"
          - "@testing-library/*"
          - "jsdom"
          - "happy-dom"
      markdown:
        patterns:
          - "remark"
          - "remark-*"
          - "rehype-*"
          - "@mdx-js/*"
          - "unified"
          - "unist-util-*"
          - "mdast-util-*"
          - "hast-util-*"
          - "micromark*"
          - "vfile"
          - "slugify"
          - "he"
      styles:
        patterns:
          - "postcss"
          - "postcss-*"
          - "autoprefixer"
          - "cssnano"
          - "purgecss"
          - "sass"
      build:
        patterns:
          - "vite"
          - "vite-*"
          - "@vitejs/*"
          - "terser"
          - "sharp"
          - "glob"
          - "fs-extra"
      runtime:
        patterns:
          - "he"
          - "slugify"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 15
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: nix
    directory: "/"
    schedule:
      interval: weekly
    groups:
      nix:
        patterns:
          - "*"
