version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    versioning-strategy: increase
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "astro-*"
      lint:
        patterns:
          - "eslint"
          - "eslint-plugin-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "prettier"
          - "prettier-plugin-*"
      test:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@stryker-mutator/*"
          - "jsdom"
          - "happy-dom"
      types:
        patterns:
          - "typescript"
          - "@types/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 15
  - package-ecosystem: nix
    directory: "/"
    schedule:
      interval: weekly

